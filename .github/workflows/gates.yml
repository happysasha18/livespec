# gates.yml — the CI mirror of the push gate (SPEC M-5, ROADMAP row 14).
# Same checks, one source of truth: CI runs the SAME scripts the local pre-push hook
# runs — it never redefines them. This is the SECOND net: the local reach map
# (SPEC INV-45) is a developer-latency optimization; the CI net always runs the full set.
name: gates
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jerusalem   # gate (a) wants a today-dated prover record; "today" is the author's day, not UTC's
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # gate (a)'s freshness rule reads commit history (record vs PRODUCT_SPEC.md)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install pytest
        run: pip install pytest
      - name: test suite (gate b, full — the reach map stays local)
        run: python3 -m pytest -q
      - name: gate a — fresh prover record
        # LIVE_SPEC_DIFF_BASE lets the script judge the inbox-only carve-out (row 269,
        # SPEC M-6/INV-112): a push whose diff is exactly one new inbox/ file owes no
        # fresh record. github.event.before is the pre-push SHA on a push; on a PR it is
        # empty and the script falls back to origin/main.
        env:
          LIVE_SPEC_DIFF_BASE: ${{ github.event.before }}
        run: guardrails/check-prover-record.sh
      - name: gate d — matrix coverage
        run: guardrails/check-matrix-coverage.sh
      - name: gate g — pin drift
        run: guardrails/check-pin-drift.sh
      - name: gate f — skill loadability
        run: guardrails/check-skill-loadability.sh
      - name: gate e — prototype fence
        run: guardrails/check-prototype-fence.sh
      - name: gate i — shipped language (no owner name / stray Cyrillic in the shipped set, SPEC INV-120)
        run: guardrails/check-shipped-language.sh

  # After the gates pass on a real push to main, sync the standalone mirror repos from the
  # pack — the durable, cross-machine arm of the same job the local pre-push hook does (the
  # local hook covers this machine; CI covers any machine, including a browser/cloud session).
  # Token-gated: it skips cleanly until a MIRROR_SYNC_TOKEN secret with write access to the
  # mirror repos exists, so CI never reds for a missing token (honest failure by name, SPEC
  # INV-112). Extends the push gate (SPEC M-6) and scripts/sync-mirrors.sh (SPEC INV-96).
  sync-mirrors:
    needs: gates
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # the mirror push authenticates with the PAT below, not the default token
      - name: sync standalone mirrors from the pack
        env:
          GH_TOKEN: ${{ secrets.MIRROR_SYNC_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "MIRROR_SYNC_TOKEN not set — skipping mirror sync (add the secret to enable the CI arm)."
            exit 0
          fi
          gh auth setup-git   # route git pushes through gh, so the mirror push uses the PAT
          git config --global user.name "live-spec mirror bot"
          git config --global user.email "mirror-bot@users.noreply.github.com"
          bash scripts/sync-mirrors.sh
