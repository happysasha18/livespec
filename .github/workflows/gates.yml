# gates.yml — the CI mirror of the push gate (SPEC M-5, ROADMAP row 14).
# Same checks, one source of truth: CI runs the SAME scripts the local pre-push hook
# runs — it never redefines them. This is the SECOND net: the local reach map
# (SPEC INV-45) is a developer-latency optimization; the CI net always runs the full set.
name: gates
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jerusalem   # gate (a) wants a today-dated prover record; "today" is the author's day, not UTC's
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0    # gate (a)'s freshness rule reads commit history (record vs PRODUCT_SPEC.md)
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install pytest
        run: pip install pytest
      - name: test suite (gate b, full — the reach map stays local)
        run: python3 -m pytest -q
      - name: gate a — fresh prover record
        # LIVE_SPEC_DIFF_BASE lets the script judge the inbox-only carve-out (row 269,
        # SPEC M-6/INV-112): a push whose diff is exactly one new inbox/ file owes no
        # fresh record. github.event.before is the pre-push SHA on a push; on a PR it is
        # empty and the script falls back to origin/main.
        env:
          LIVE_SPEC_DIFF_BASE: ${{ github.event.before }}
        run: guardrails/check-prover-record.sh
      - name: gate d — matrix coverage
        run: guardrails/check-matrix-coverage.sh
      - name: gate g — pin drift
        run: guardrails/check-pin-drift.sh
      - name: gate f — skill loadability
        run: guardrails/check-skill-loadability.sh
      - name: gate e — prototype fence
        run: guardrails/check-prototype-fence.sh
      - name: gate i — shipped language (no owner name / stray Cyrillic in the shipped set, SPEC INV-120)
        run: guardrails/check-shipped-language.sh
      - name: gate j — no broad browser-kill (cleanup targets the test resource only, SPEC INV-162)
        run: guardrails/check-broad-kill.sh
      - name: gate l — muted browser launch (every browser-driving script launches muted, SPEC INV-157)
        run: guardrails/check-muted-launch.sh
      - name: gate o — cleanup notice (every cleanup path that ends a process says what it ended, SPEC INV-204)
        run: guardrails/check-cleanup-notice.sh
      - name: gate p — touchpoint kind (a surface speaks only the kind its touchpoint affords, SPEC INV-205)
        run: python3 guardrails/check-touchpoint-kind.py
      - name: gate q — waiting list (the board loses nothing — no over-cap shown set, no demotion into the void, SPEC INV-206)
        run: python3 guardrails/check-board.py
      - name: gate r — authority anchor (a decision recorded as the person's names its exchange, SPEC INV-207)
        run: python3 guardrails/check-authority-anchor.py
      - name: gate s — skill review (a substantive skill change carries its skill-creator review record, SPEC INV-208)
        # LIVE_SPEC_DIFF_BASE lets the gate read the push range (the same base as gate a); on a PR it
        # is empty and the gate falls back to origin/main.
        env:
          LIVE_SPEC_DIFF_BASE: ${{ github.event.before }}
        run: guardrails/check-skill-review.sh
      - name: gate t — doc rotation (the pack's split-and-rotated docs lose nothing, SPEC INV-209)
        run: python3 guardrails/check-doc-rotation.py

  # After the gates pass on a real push to main, sync the standalone mirror repos from the
  # pack — the durable, cross-machine arm of the same job the local pre-push hook does (the
  # local hook covers this machine; CI covers any machine, including a browser/cloud session).
  # Auth is a per-mirror SSH deploy key held in the MIRROR_SYNC_DEPLOY_KEY secret. The job
  # skips cleanly when that secret is absent, so CI never reds for a missing key (honest
  # failure by name, SPEC INV-112). Extends the push gate (SPEC M-6) and scripts/sync-mirrors.sh
  # (SPEC INV-96).
  sync-mirrors:
    needs: gates
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false   # the mirror push authenticates with the deploy key below, not the default token
      - name: sync standalone mirrors from the pack
        env:
          MIRROR_SYNC_DEPLOY_KEY: ${{ secrets.MIRROR_SYNC_DEPLOY_KEY }}
        run: |
          if [ -z "${MIRROR_SYNC_DEPLOY_KEY}" ]; then
            echo "MIRROR_SYNC_DEPLOY_KEY not set — skipping mirror sync (add the secret to enable the CI arm)."
            exit 0
          fi
          key_file="$(mktemp)"
          printf '%s\n' "${MIRROR_SYNC_DEPLOY_KEY}" > "$key_file"
          chmod 600 "$key_file"
          export GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
          export MIRROR_SSH=1   # tell sync-mirrors.sh to reach the mirror over SSH, not gh/HTTPS
          git config --global user.name "live-spec mirror bot"
          git config --global user.email "mirror-bot@users.noreply.github.com"
          bash scripts/sync-mirrors.sh
